<!DOCTYPE html>  
<html>  
<head>  
  <meta charset="UTF-8">  
  <title>Busted Demo</title>  
  <style>  
    body { background: #111; color: #fff; text-align: center; padding: 100px; }  
    button { padding: 20px; background: #f00; color: white; font-size: 24px; border: none; cursor: pointer; }  
  </style>  
</head>  
<body>  
  <h1>Security Demo App</h1>  
  <p>WAARSCHUWING: Alleen in VM draaien!</p>  
  <button id="busted-btn">Klik hier om PowerShell te triggeren (Busted!)</button>  

  <script>  
    const btn = document.getElementById('busted-btn');  
    btn.addEventListener('click', () => {  
      if (window.electronAPI) {  
        window.electronAPI.runPowershellDemo();   
      } else {  
        alert('Niet in Electron – test lokaal met npm start');  
      }  
    });  
  </script>  
</body>  
</html>
